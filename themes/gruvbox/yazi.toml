# Gruvbox Dark (Hard) theme for Yazi

[mgr]
cwd = { fg = "#83a598" }

find_keyword  = { fg = "#fabd2f", bold = true }
find_position = { fg = "#d3869b", italic = true }

symlink_target = { fg = "#8ec07c", italic = true }

marker_copied   = { fg = "#b8bb26", bg = "#b8bb26" }
marker_cut      = { fg = "#fb4934", bg = "#fb4934" }
marker_marked   = { fg = "#83a598", bg = "#83a598" }
marker_selected = { fg = "#fabd2f", bg = "#fabd2f" }

count_copied   = { fg = "#282828", bg = "#b8bb26" }
count_cut      = { fg = "#282828", bg = "#fb4934" }
count_selected = { fg = "#282828", bg = "#fabd2f" }

border_symbol = "│"
border_style  = { fg = "#504945" }

[indicator]
parent  = { fg = "#928374" }
current = { fg = "#ebdbb2" }
preview = { fg = "#928374" }

[tabs]
active   = { fg = "#282828", bg = "#ebdbb2" }
inactive = { fg = "#a89984", bg = "#3c3836" }

[mode]
normal_main = { fg = "#282828", bg = "#83a598", bold = true }
normal_alt  = { fg = "#83a598", bg = "#3c3836" }
select_main = { fg = "#282828", bg = "#b8bb26", bold = true }
select_alt  = { fg = "#b8bb26", bg = "#3c3836" }
unset_main  = { fg = "#282828", bg = "#d3869b", bold = true }
unset_alt   = { fg = "#d3869b", bg = "#3c3836" }

[status]
overall = { fg = "#ebdbb2", bg = "#3c3836" }

sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_type  = { fg = "#83a598" }
perm_read  = { fg = "#fabd2f" }
perm_write = { fg = "#fb4934" }
perm_exec  = { fg = "#b8bb26" }
perm_sep   = { fg = "#504945" }

progress_label  = { fg = "#ebdbb2", bold = true }
progress_normal = { fg = "#83a598", bg = "#3c3836" }
progress_error  = { fg = "#fb4934", bg = "#3c3836" }

[which]
cols            = 3
mask            = { bg = "#282828" }
cand            = { fg = "#8ec07c" }
rest            = { fg = "#928374" }
desc            = { fg = "#d3869b" }
separator       = " → "
separator_style = { fg = "#504945" }

[input]
border   = { fg = "#83a598" }
title    = { fg = "#83a598" }
value    = { fg = "#ebdbb2" }
selected = { reversed = true }

[pick]
border   = { fg = "#83a598" }
active   = { fg = "#282828", bg = "#83a598" }
inactive = { fg = "#ebdbb2" }

[confirm]
border = { fg = "#83a598" }
title  = { fg = "#83a598" }
body   = { fg = "#ebdbb2" }
list   = { fg = "#ebdbb2" }
btn_yes = { fg = "#282828", bg = "#b8bb26" }
btn_no  = { fg = "#282828", bg = "#fb4934" }

[spot]
border   = { fg = "#83a598" }
title    = { fg = "#83a598" }
tbl_col  = { fg = "#83a598", reversed = true }
tbl_cell = { fg = "#ebdbb2", reversed = true }

[notify]
title_info  = { fg = "#b8bb26" }
title_warn  = { fg = "#fabd2f" }
title_error = { fg = "#fb4934" }

[cmp]
border   = { fg = "#504945" }
active   = { fg = "#282828", bg = "#83a598" }
inactive = { fg = "#a89984" }

[tasks]
border  = { fg = "#83a598" }
title   = { fg = "#83a598" }
hovered = { fg = "#282828", bg = "#83a598" }

[help]
on      = { fg = "#83a598" }
run     = { fg = "#d3869b" }
desc    = { fg = "#a89984" }
hovered = { fg = "#282828", bg = "#83a598" }
footer  = { fg = "#504945" }

[filetype]
rules = [
  # Media
  { mime = "image/*", fg = "#fabd2f" },
  { mime = "video/*", fg = "#d3869b" },
  { mime = "audio/*", fg = "#b8bb26" },

  # Archives
  { mime = "application/zip",             fg = "#fb4934" },
  { mime = "application/gzip",            fg = "#fb4934" },
  { mime = "application/x-tar",           fg = "#fb4934" },
  { mime = "application/x-bzip*",         fg = "#fb4934" },
  { mime = "application/x-7z-compressed", fg = "#fb4934" },
  { mime = "application/x-rar",           fg = "#fb4934" },
  { mime = "application/x-xz",            fg = "#fb4934" },

  # Documents
  { mime = "application/pdf",  fg = "#fe8019" },
  { mime = "application/json", fg = "#fabd2f" },
  { mime = "application/xml",  fg = "#fabd2f" },

  # Fallbacks
  { url = "*/", fg = "#83a598", bold = true },
  { url = "*",  is = "orphan", fg = "#fb4934", italic = true },
  { url = "*",  is = "link",   fg = "#8ec07c", italic = true },
  { url = "*",  is = "exec",   fg = "#b8bb26" },
  { url = "*",  fg = "#ebdbb2" },
]
